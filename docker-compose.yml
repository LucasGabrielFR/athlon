services:
  mysql:
    image: mysql:8.0
    container_name: athlon-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: athlon_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athlon-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      # Sobrescreve a URL do banco para conectar ao container mysql em vez do localhost
      - DATABASE_URL=mysql://user:password@mysql:3306/athlon_db

volumes:
  mysql_data:
